<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无损图片批量混淆/还原工具</title>
    <style>
        :root {
            --primary-color: #4CAF50; /* 混淆绿色 */
            --secondary-color: #2196F3; /* 还原蓝色 */
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #333;
            --border-color: #eee;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 900px;
            width: 100%;
        }
        h1 { text-align: center; color: #1a1a1a; margin-bottom: 0.5rem; font-size: 1.5rem;}
        .subtitle { text-align: center; color: #666; margin-bottom: 1.5rem; font-size: 0.9rem;}
        
        /* 控制区域 */
        .control-panel {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }
        .control-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }
        .input-item { display: flex; flex-direction: column; }
        label { margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; color: #555;}
        input[type="text"], input[type="number"], input[type="file"] {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
        }
        input[type="file"] { padding: 7px; background: white;}

        /* 按钮区域 */
        .action-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }
        .mode-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .mode-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid transparent;
            border-radius: 6px;
            background-color: #e0e0e0;
            color: #333;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .mode-btn:hover { background-color: #d5d5d5; }
        .mode-btn.active_enc {
            background-color: var(--primary-color);
            color: white;
            border-color: #388E3C;
        }
        .mode-btn.active_dec {
            background-color: var(--secondary-color);
            color: white;
            border-color: #1976D2;
        }

        #startBtn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        /* 初始状态 gray, 根据模式变色 */
        #startBtn.default { background-color: #9e9e9e; cursor: not-allowed; }
        #startBtn.enc { background-color: var(--primary-color); }
        #startBtn.enc:hover { background-color: #45a049; }
        #startBtn.dec { background-color: var(--secondary-color); }
        #startBtn.dec:hover { background-color: #0b7dda; }
        #startBtn:disabled { background-color: #ccc; cursor: wait; }

        /* 文件列表和进度 */
        .status-panel {
            margin-bottom: 20px;
            display: none; /* 初始隐藏 */
        }
        #progressBarContainer {
            width: 100%;
            background-color: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        #progressBar {
            width: 0%;
            height: 10px;
            background-color: var(--primary-color);
            transition: width 0.1s linear, background-color 0.3s;
        }
        #statusSummary { font-size: 0.9rem; color: #666; text-align: center;}

        /* 结果预览区域 */
        .result-area {
            border-top: 2px solid var(--border-color);
            padding-top: 20px;
        }
        h3 { text-align: center; margin-top: 0; }
        #resultList {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }
        .result-item {
            background: #f9f9f9;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .result-item img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 4px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            /* 解决低像素还原时的模糊问题，保持像素清晰 */
            image-rendering: pixelated; 
        }
        .result-item .file-info {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 10px;
            word-break: break-all;
            text-align: center;
        }
        .download-btn {
            background-color: #333;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .download-btn:hover { background-color: #555; }

        @media (max-width: 600px) {
            .container { padding: 1rem; }
            .control-group { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🖼️ 无损图片批量混淆器</h1>
    <div class="subtitle">PNG无损处理，彻底杜绝还原网格。所有处理均在本地浏览器完成。</div>
    
    <div class="control-panel">
        <div class="control-group">
            <div class="input-item">
                <label for="imageInput">1. 选择图片 (支持多选 PNG/JPG)</label>
                <input type="file" id="imageInput" accept="image/png, image/jpeg" multiple>
            </div>
            <div class="input-item">
                <label for="password">2. 密钥 (Password)</label>
                <input type="text" id="password" placeholder="核心防伪，不可泄漏">
            </div>
            <div class="input-item">
                <label for="blockSize">3. 图块大小 (Size)</label>
                <input type="number" id="blockSize" value="10" min="2" max="200">
            </div>
        </div>

        <div class="action-area">
            <label>4. 选择操作模式</label>
            <div class="mode-selector">
                <div id="modeEnc" class="mode-btn">🔒 混淆 (加密)</div>
                <div id="modeDec" class="mode-btn">🔓 还原 (解密)</div>
            </div>
            <button id="startBtn" class="default" disabled>请先选择图片</button>
        </div>
    </div>

    <div class="status-panel" id="statusPanel">
        <div id="progressBarContainer">
            <div id="progressBar"></div>
        </div>
        <div id="statusSummary">等待开始...</div>
    </div>

    <div class="result-area" id="resultArea" style="display:none;">
        <h3>处理结果列表</h3>
        <div id="resultList">
            </div>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const imageInput = document.getElementById('imageInput');
    const passwordInput = document.getElementById('password');
    const blockSizeInput = document.getElementById('blockSize');
    
    const modeEncBtn = document.getElementById('modeEnc');
    const modeDecBtn = document.getElementById('modeDec');
    const startBtn = document.getElementById('startBtn');
    
    const statusPanel = document.getElementById('statusPanel');
    const progressBar = document.getElementById('progressBar');
    const statusSummary = document.getElementById('statusSummary');
    
    const resultArea = document.getElementById('resultArea');
    const resultList = document.getElementById('resultList');
    
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let selectedFiles = [];
    let currentMode = null; // 'enc' or 'dec'

    // --- 初始化: 关闭Canvas的图像平滑功能，这是防止网格的核心一步 ---
    ctx.imageSmoothingEnabled = false;
    ctx.webkitImageSmoothingEnabled = false;
    ctx.mozImageSmoothingEnabled = false;
    ctx.msImageSmoothingEnabled = false;

    // 1. 监听多图片加载
    imageInput.addEventListener('change', (e) => {
        selectedFiles = Array.from(e.target.files);
        if (selectedFiles.length > 0) {
            startBtn.disabled = false;
            startBtn.innerText = `开始批量处理 (${selectedFiles.length} 张)`;
            updateStartBtnStyle();
        } else {
            startBtn.disabled = true;
            startBtn.className = 'default';
            startBtn.innerText = '请先选择图片';
        }
        // 清空之前的预览
        resultArea.style.display = 'none';
        resultList.innerHTML = '';
        statusPanel.style.display = 'none';
    });

    // 2. 模式选择
    modeEncBtn.addEventListener('click', () => {
        currentMode = 'enc';
        modeEncBtn.classList.add('active_enc');
        modeDecBtn.classList.remove('active_dec');
        updateStartBtnStyle();
    });

    modeDecBtn.addEventListener('click', () => {
        currentMode = 'dec';
        modeDecBtn.classList.add('active_dec');
        modeEncBtn.classList.remove('active_enc');
        updateStartBtnStyle();
    });

    function updateStartBtnStyle() {
        if (!currentMode || selectedFiles.length === 0) return;
        startBtn.className = currentMode; // enc or dec
    }

    // 3. 随机数生成器 (同前，确保兼容)
    function cyrb128(str) {
        let h1 = 1779033703, h2 = 3144134277, h3 = 1013904242, h4 = 2773480762;
        for (let i = 0, k; i < str.length; i++) {
            k = str.charCodeAt(i);
            h1 = h2 ^ Math.imul(h1 ^ k, 597399067);
            h2 = h3 ^ Math.imul(h2 ^ k, 2869860233);
            h3 = h4 ^ Math.imul(h3 ^ k, 951274213);
            h4 = h1 ^ Math.imul(h4 ^ k, 2716044179);
        }
        h1 = Math.imul(h3 ^ (h1 >>> 18), 597399067);
        h2 = Math.imul(h4 ^ (h2 >>> 22), 2869860233);
        h3 = Math.imul(h1 ^ (h3 >>> 17), 951274213);
        h4 = Math.imul(h2 ^ (h4 >>> 19), 2716044179);
        return [h1>>>0, h2>>>0, h3>>>0, h4>>>0];
    }
    function sfc32(a, b, c, d) {
        return function() {
            a >>>= 0; b >>>= 0; c >>>= 0; d >>>= 0; 
            var t = (a + b | 0) + d | 0;
            d = d + 1 | 0;
            a = b ^ b >>> 9;
            b = c + (c << 3) | 0;
            c = c << 21 | c >>> 11;
            c = c + t | 0;
            return (t >>> 0) / 4294967296;
        }
    }
    function getShuffledMapping(length, password) {
        const seed = cyrb128(password);
        const rand = sfc32(seed[0], seed[1], seed[2], seed[3]);
        let arr = Array.from({length: length}, (_, i) => i);
        for (let i = length - 1; i > 0; i--) {
            const j = Math.floor(rand() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // 4. 核心：加载单张图片为 Image 对象
    function loadImage(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => resolve({ img, filename: file.name });
                img.onerror = reject;
                img.src = event.target.result;
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    // 5. 核心：无损处理单张图片
    async function processSingleImage(imgObj, size, password, isEncrypt) {
        const { img, filename } = imgObj;
        
        const originW = img.width;
        const originH = img.height;

        // 计算填充后的尺寸（向上取 size 的倍数）
        const fillW = Math.ceil(originW / size) * size;
        const fillH = Math.ceil(originH / size) * size;

        // 重新设置 Canvas 尺寸
        canvas.width = fillW;
        canvas.height = fillH;

        // 核心优化：每次重新设置尺寸后，必须重新关闭平滑，否则浏览器可能会重置它
        ctx.imageSmoothingEnabled = false;
        ctx.webkitImageSmoothingEnabled = false;

        // 用黑色填充背景
        ctx.fillStyle = "#000000";
        ctx.fillRect(0, 0, fillW, fillH);
        
        // 绘制原始图片
        ctx.drawImage(img, 0, 0);

        const cols = fillW / size;
        const rows = fillH / size;
        const totalBlocks = cols * rows;

        // 生成映射数组
        const mapping = getShuffledMapping(totalBlocks, password);

        // 为了绝对无损，我们不使用 getImageData，而是使用 drawImage 复制小块
        // 这样可以避免 Canvas 像素点阵和 ImageData 转换时可能出现的舍入误差
        
        // 创建一个临时 Canvas 用来保存填充黑边后的完整图像，作为源
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = fillW;
        tempCanvas.height = fillH;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.imageSmoothingEnabled = false;
        tempCtx.drawImage(canvas, 0, 0); // 此时 canvas 里是填了黑边的原图

        // 清空主 Canvas 准备重绘
        ctx.fillStyle = "#000000"; 
        ctx.fillRect(0, 0, fillW, fillH);

        // 根据操作类型移位
        for (let i = 0; i < totalBlocks; i++) {
            const targetIndex = isEncrypt ? mapping[i] : i;
            const sourceIndex = isEncrypt ? i : mapping[i];
            
            const sourceX = (sourceIndex % cols) * size;
            const sourceY = Math.floor(sourceIndex / cols) * size;
            const targetX = (targetIndex % cols) * size;
            const targetY = Math.floor(targetIndex / cols) * size;

            // 无损复制：将 tempCanvas 的源块绘制到 canvas 的目标位置
            ctx.drawImage(
                tempCanvas, 
                sourceX, sourceY, size, size, // 源起始和大小
                targetX, targetY, size, size  // 目标起始和大小
            );
        }

        // --- 核心优化：导出为 PNG (无损) ---
        // 只有 PNG 能保证在经过混淆-保存-读取-还原这个循环后，像素值完全不改变。
        const outputURL = canvas.toDataURL('image/png');
        
        // 生成新的文件名
        const prefix = isEncrypt ? 'enc_' : 'dec_';
        let newFilename = prefix + filename;
        // 替换后缀为 png
        newFilename = newFilename.replace(/\.(jpg|jpeg|jpeg)$|$/i, '.png');

        return { outputURL, newFilename, fillW, fillH };
    }

    // 6. UI: 添加结果到列表
    function addResultToUI(result, originalFilename) {
        resultArea.style.display = 'block';
        
        const item = document.createElement('div');
        item.className = 'result-item';
        
        const img = new Image();
        img.src = result.outputURL;
        
        const info = document.createElement('div');
        info.className = 'file-info';
        info.innerText = `原名: ${originalFilename}\n尺寸: ${result.fillW}x${result.fillH} (PNG无损)`;
        
        const dlBtn = document.createElement('a');
        dlBtn.className = 'download-btn';
        dlBtn.href = result.outputURL;
        dlBtn.download = result.newFilename;
        dlBtn.innerText = `⬇️ 保存 PNG`;
        
        item.appendChild(img);
        item.appendChild(info);
        item.appendChild(dlBtn);
        resultList.appendChild(item);
    }

    // 7. 批量处理主流程
    startBtn.addEventListener('click', async () => {
        const pw = passwordInput.value;
        const size = parseInt(blockSizeInput.value, 10);

        // 校验
        if (selectedFiles.length === 0) return;
        if (!pw) { alert('密钥是生成的种子，必须输入！'); return; }
        if (size < 2) { alert('Size 必须 >= 2'); return; }
        if (!currentMode) { alert('请选择 混淆 或 还原 模式！'); return; }

        // UI 准备
        startBtn.disabled = true;
        startBtn.innerText = '正在后台处理...';
        statusPanel.style.display = 'block';
        resultList.innerHTML = ''; // 清空之前的
        resultArea.style.display = 'none';
        
        // 根据模式设置进度条颜色
        progressBar.style.backgroundColor = currentMode === 'enc' ? 'var(--primary-color)' : 'var(--secondary-color)';

        let successCount = 0;
        const total = selectedFiles.length;
        const isEncrypt = (currentMode === 'enc');

        // 使用 for...of 确保按顺序异步处理，避免瞬间挤爆内存
        for (let i = 0; i < total; i++) {
            const file = selectedFiles[i];
            const currentNum = i + 1;
            
            statusSummary.innerText = `正在处理第 ${currentNum}/${total} 张: ${file.name}...`;
            // 更新进度条
            const percent = (i / total) * 100;
            progressBar.style.width = percent + '%';

            try {
                // 1. 加载图片
                const imgObj = await loadImage(file);
                
                // 2. 处理图片 (这里有微小的延时让 UI 能够刷新)
                await new Promise(r => setTimeout(r, 10));
                const result = await processSingleImage(imgObj, size, pw, isEncrypt);
                
                // 3. 添加到 UI
                addResultToUI(result, file.name);
                successCount++;
            } catch (err) {
                console.error(`处理 ${file.name} 失败:`, err);
                const errorItem = document.createElement('div');
                errorItem.className = 'result-item';
                errorItem.style.color = 'red';
                errorItem.innerText = `❌ 处理失败: ${file.name}`;
                resultList.appendChild(errorItem);
                resultArea.style.display = 'block';
            }
        }

        // 处理完成
        progressBar.style.width = '100%';
        statusSummary.innerText = `✅ 处理完成！成功: ${successCount}/${total}。请在下方点击按钮保存 PNG 图片。`;
        startBtn.disabled = false;
        startBtn.innerText = `开始批量处理 (${selectedFiles.length} 张)`;
    });

</script>

</body>
</html>
