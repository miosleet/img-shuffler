<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无损图片批量混淆/还原工具 (增强版)</title>
    <style>
        :root {
            --primary-color: #4CAF50;
            --secondary-color: #2196F3;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #333;
            --border-color: #eee;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 1000px;
            width: 100%;
        }
        h1 { text-align: center; color: #1a1a1a; margin-bottom: 0.5rem; font-size: 1.5rem;}
        .subtitle { text-align: center; color: #666; margin-bottom: 1.5rem; font-size: 0.9rem;}
        
        .control-panel {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }
        .control-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }
        .input-item { display: flex; flex-direction: column; }
        label { margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; color: #555;}
        input[type="text"], input[type="number"], input[type="file"] {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
        }
        input[type="file"] { padding: 7px; background: white;}
        .hint {
            font-size: 0.8rem;
            color: #e67e22;
            margin-top: 4px;
            min-height: 18px;
        }

        .config-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        .config-string-box {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: #fff;
            font-family: monospace;
            font-size: 0.9rem;
        }
        .config-import-box {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }
        .config-import-box input {
            flex: 1;
        }
        .action-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }
        .mode-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .mode-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid transparent;
            border-radius: 6px;
            background-color: #e0e0e0;
            color: #333;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .mode-btn:hover { background-color: #d5d5d5; }
        .mode-btn.active_enc {
            background-color: var(--primary-color);
            color: white;
            border-color: #388E3C;
        }
        .mode-btn.active_dec {
            background-color: var(--secondary-color);
            color: white;
            border-color: #1976D2;
        }

        #startBtn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        #startBtn.default { background-color: #9e9e9e; cursor: not-allowed; }
        #startBtn.enc { background-color: var(--primary-color); }
        #startBtn.enc:hover { background-color: #45a049; }
        #startBtn.dec { background-color: var(--secondary-color); }
        #startBtn.dec:hover { background-color: #0b7dda; }
        #startBtn:disabled { background-color: #ccc; cursor: wait; }

        .status-panel {
            margin-bottom: 20px;
            display: none;
        }
        #progressBarContainer {
            width: 100%;
            background-color: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        #progressBar {
            width: 0%;
            height: 10px;
            background-color: var(--primary-color);
            transition: width 0.05s linear;
        }
        #statusSummary { font-size: 0.9rem; color: #666; text-align: center;}

        .result-area {
            border-top: 2px solid var(--border-color);
            padding-top: 20px;
        }
        h3 { text-align: center; margin-top: 0; }
        #resultList {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }
        .result-item {
            background: #f9f9f9;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .result-item img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 4px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            image-rendering: pixelated;
        }
        .result-item .file-info {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 10px;
            word-break: break-all;
            text-align: center;
        }
        .download-btn {
            background-color: #333;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .download-btn:hover { background-color: #555; }
        .copy-btn {
            background-color: #607d8b;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-left: 5px;
        }
        .copy-btn:hover { background-color: #455a64; }

        @media (max-width: 600px) {
            .container { padding: 1rem; }
            .control-group { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🖼️ 无损图片批量混淆器 (增强版)</h1>
    <div class="subtitle">支持自定义输出尺寸 · 配置字符串导入/导出 · 实时内部进度</div>
    
    <div class="control-panel">
        <div class="control-group">
            <div class="input-item">
                <label for="imageInput">1. 选择图片 (支持多选 PNG/JPG)</label>
                <input type="file" id="imageInput" accept="image/png, image/jpeg" multiple>
            </div>
            <div class="input-item">
                <label for="password">2. 密钥 (Password)</label>
                <input type="text" id="password" placeholder="核心防伪，不可泄漏">
            </div>
            <div class="input-item">
                <label for="blockSize">3. 块大小 (BlockSize) px</label>
                <input type="number" id="blockSize" value="8" min="1" max="200">
                <div id="blockSizeHint" class="hint"></div>
            </div>
        </div>

        <div class="control-group">
            <div class="input-item">
                <label for="picWidth">4. 输出宽度 (PictureSizeX) px</label>
                <input type="number" id="picWidth" placeholder="自动获取" min="1" step="1">
            </div>
            <div class="input-item">
                <label for="picHeight">5. 输出高度 (PictureSizeY) px</label>
                <input type="number" id="picHeight" placeholder="自动获取" min="1" step="1">
            </div>
        </div>

        <!-- 配置字符串区域 -->
        <div style="margin: 10px 0;">
            <label>⚙️ 配置字符串 (实时生成，可复制分享)</label>
            <div style="display: flex; align-items: center;">
                <input type="text" id="configString" class="config-string-box" readonly>
                <button id="copyConfigBtn" class="copy-btn">📋 复制</button>
            </div>
            <div class="config-import-box">
                <input type="text" id="importConfigInput" placeholder="粘贴配置字符串，如: pwd=abc&block=8&w=800&h=600">
                <button id="importConfigBtn" style="padding: 8px 15px;">⬇️ 导入</button>
            </div>
        </div>

        <div class="action-area">
            <label>6. 选择操作模式</label>
            <div class="mode-selector">
                <div id="modeEnc" class="mode-btn">🔒 混淆 (加密)</div>
                <div id="modeDec" class="mode-btn">🔓 还原 (解密)</div>
            </div>
            <button id="startBtn" class="default" disabled>请先选择图片</button>
        </div>
    </div>

    <div class="status-panel" id="statusPanel">
        <div id="progressBarContainer">
            <div id="progressBar"></div>
        </div>
        <div id="statusSummary">等待开始...</div>
    </div>

    <div class="result-area" id="resultArea" style="display:none;">
        <h3>处理结果列表</h3>
        <div id="resultList"></div>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    (function(){
        "use strict";

        // DOM 元素
        const imageInput = document.getElementById('imageInput');
        const passwordInput = document.getElementById('password');
        const blockSizeInput = document.getElementById('blockSize');
        const blockSizeHint = document.getElementById('blockSizeHint');
        const picWidth = document.getElementById('picWidth');
        const picHeight = document.getElementById('picHeight');
        const configString = document.getElementById('configString');
        
        const modeEncBtn = document.getElementById('modeEnc');
        const modeDecBtn = document.getElementById('modeDec');
        const startBtn = document.getElementById('startBtn');
        
        const statusPanel = document.getElementById('statusPanel');
        const progressBar = document.getElementById('progressBar');
        const statusSummary = document.getElementById('statusSummary');
        
        const resultArea = document.getElementById('resultArea');
        const resultList = document.getElementById('resultList');
        
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // 状态变量
        let selectedFiles = [];
        let currentMode = null; // 'enc' or 'dec'
        let originalImageSize = { width: 0, height: 0 }; // 用于自动填充尺寸

        // 初始化 Canvas 平滑关闭
        function disableSmoothing() {
            ctx.imageSmoothingEnabled = false;
            ctx.webkitImageSmoothingEnabled = false;
            ctx.mozImageSmoothingEnabled = false;
            ctx.msImageSmoothingEnabled = false;
        }
        disableSmoothing();

        // ---------- 辅助函数：块大小提示 ----------
        function updateBlockSizeHint() {
            const val = parseInt(blockSizeInput.value, 10);
            if (val < 4) {
                blockSizeHint.textContent = '⚠️ 性能压力过大，建议大于等于4px';
            } else {
                blockSizeHint.textContent = '';
            }
        }
        blockSizeInput.addEventListener('input', updateBlockSizeHint);
        updateBlockSizeHint();

        // ---------- 图片选择：自动填充尺寸 ----------
        imageInput.addEventListener('change', async (e) => {
            selectedFiles = Array.from(e.target.files);
            if (selectedFiles.length > 0) {
                startBtn.disabled = false;
                startBtn.innerText = `开始批量处理 (${selectedFiles.length} 张)`;
                updateStartBtnStyle();

                // 读取第一张图片的原始尺寸，并自动填入宽度/高度输入框
                try {
                    const firstImg = await loadImageToGetSize(selectedFiles[0]);
                    picWidth.value = firstImg.width;
                    picHeight.value = firstImg.height;
                    originalImageSize = { width: firstImg.width, height: firstImg.height };
                } catch (err) {
                    console.warn('无法读取第一张图片尺寸', err);
                }
            } else {
                startBtn.disabled = true;
                startBtn.className = 'default';
                startBtn.innerText = '请先选择图片';
            }
            // 清空预览
            resultArea.style.display = 'none';
            resultList.innerHTML = '';
            statusPanel.style.display = 'none';
            
            updateConfigString(); // 尺寸变化后更新配置字符串
        });

        // 辅助：仅加载图片获取尺寸
        function loadImageToGetSize(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => resolve({ width: img.width, height: img.height });
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // ---------- 模式选择 ----------
        modeEncBtn.addEventListener('click', () => {
            currentMode = 'enc';
            modeEncBtn.classList.add('active_enc');
            modeDecBtn.classList.remove('active_dec');
            updateStartBtnStyle();
            updateConfigString();
        });
        modeDecBtn.addEventListener('click', () => {
            currentMode = 'dec';
            modeDecBtn.classList.add('active_dec');
            modeEncBtn.classList.remove('active_enc');
            updateStartBtnStyle();
            updateConfigString();
        });

        function updateStartBtnStyle() {
            if (!currentMode || selectedFiles.length === 0) return;
            startBtn.className = currentMode;
        }

        // ---------- 配置字符串实时生成 ----------
        function generateConfigString() {
            const pwd = passwordInput.value || '';
            const block = blockSizeInput.value;
            const w = picWidth.value;
            const h = picHeight.value;
            return `pwd=${pwd}&block=${block}&w=${w}&h=${h}`;
        }

        function updateConfigString() {
            configString.value = generateConfigString();
        }

        // 监听所有相关输入变化
        passwordInput.addEventListener('input', updateConfigString);
        blockSizeInput.addEventListener('input', () => {
            updateBlockSizeHint();
            updateConfigString();
        });
        picWidth.addEventListener('input', updateConfigString);
        picHeight.addEventListener('input', updateConfigString);

        // 复制配置字符串
        document.getElementById('copyConfigBtn').addEventListener('click', () => {
            configString.select();
            navigator.clipboard?.writeText(configString.value).then(() => {
                alert('配置已复制到剪贴板');
            }).catch(() => {
                alert('手动复制吧：' + configString.value);
            });
        });

        // 导入配置
        document.getElementById('importConfigBtn').addEventListener('click', () => {
            const importStr = document.getElementById('importConfigInput').value.trim();
            if (!importStr) return;
            
            const params = new URLSearchParams(importStr);
            const pwd = params.get('pwd') || '';
            const block = params.get('block');
            const w = params.get('w');
            const h = params.get('h');
            
            if (pwd !== null) passwordInput.value = pwd;
            if (block !== null) blockSizeInput.value = block;
            if (w !== null) picWidth.value = w;
            if (h !== null) picHeight.value = h;
            
            updateBlockSizeHint();
            updateConfigString();
            document.getElementById('importConfigInput').value = '';
            alert('配置已导入');
        });

        // ---------- 随机数生成 (与之前相同) ----------
        function cyrb128(str) {
            let h1 = 1779033703, h2 = 3144134277, h3 = 1013904242, h4 = 2773480762;
            for (let i = 0, k; i < str.length; i++) {
                k = str.charCodeAt(i);
                h1 = h2 ^ Math.imul(h1 ^ k, 597399067);
                h2 = h3 ^ Math.imul(h2 ^ k, 2869860233);
                h3 = h4 ^ Math.imul(h3 ^ k, 951274213);
                h4 = h1 ^ Math.imul(h4 ^ k, 2716044179);
            }
            h1 = Math.imul(h3 ^ (h1 >>> 18), 597399067);
            h2 = Math.imul(h4 ^ (h2 >>> 22), 2869860233);
            h3 = Math.imul(h1 ^ (h3 >>> 17), 951274213);
            h4 = Math.imul(h2 ^ (h4 >>> 19), 2716044179);
            return [h1>>>0, h2>>>0, h3>>>0, h4>>>0];
        }
        function sfc32(a, b, c, d) {
            return function() {
                a >>>= 0; b >>>= 0; c >>>= 0; d >>>= 0; 
                var t = (a + b | 0) + d | 0;
                d = d + 1 | 0;
                a = b ^ b >>> 9;
                b = c + (c << 3) | 0;
                c = c << 21 | c >>> 11;
                c = c + t | 0;
                return (t >>> 0) / 4294967296;
            }
        }
        function getShuffledMapping(length, password) {
            const seed = cyrb128(password);
            const rand = sfc32(seed[0], seed[1], seed[2], seed[3]);
            let arr = Array.from({length: length}, (_, i) => i);
            for (let i = length - 1; i > 0; i--) {
                const j = Math.floor(rand() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // 加载图片
        function loadImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => resolve({ img, filename: file.name });
                    img.onerror = reject;
                    img.src = event.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // 核心处理：增加进度回调 onProgress(percent)
        async function processSingleImage(imgObj, size, password, isEncrypt, targetWidth, targetHeight, onProgress) {
            const { img, filename } = imgObj;
            
            // 1. 缩放至用户指定尺寸 (不保持比例)
            const scaleW = targetWidth;
            const scaleH = targetHeight;
            
            // 创建缩放用的临时画布
            const scaleCanvas = document.createElement('canvas');
            scaleCanvas.width = scaleW;
            scaleCanvas.height = scaleH;
            const scaleCtx = scaleCanvas.getContext('2d');
            scaleCtx.imageSmoothingEnabled = false; // 缩放时也保持像素感（可选）
            scaleCtx.drawImage(img, 0, 0, scaleW, scaleH);
            
            // 2. 计算填充尺寸（向上取size倍数）
            const fillW = Math.ceil(scaleW / size) * size;
            const fillH = Math.ceil(scaleH / size) * size;
            
            canvas.width = fillW;
            canvas.height = fillH;
            disableSmoothing();
            
            // 用黑色填充背景
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, fillW, fillH);
            // 绘制缩放后的图像
            ctx.drawImage(scaleCanvas, 0, 0);
            
            const cols = fillW / size;
            const rows = fillH / size;
            const totalBlocks = cols * rows;
            
            const mapping = getShuffledMapping(totalBlocks, password);
            
            // 保存当前画布内容到临时画布
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = fillW;
            tempCanvas.height = fillH;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.imageSmoothingEnabled = false;
            tempCtx.drawImage(canvas, 0, 0);
            
            // 清空主画布准备重绘
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, fillW, fillH);
            
            // 循环绘制块，并报告进度
            let lastReportPercent = -1;
            for (let i = 0; i < totalBlocks; i++) {
                const targetIndex = isEncrypt ? mapping[i] : i;
                const sourceIndex = isEncrypt ? i : mapping[i];
                
                const sourceX = (sourceIndex % cols) * size;
                const sourceY = Math.floor(sourceIndex / cols) * size;
                const targetX = (targetIndex % cols) * size;
                const targetY = Math.floor(targetIndex / cols) * size;
                
                ctx.drawImage(
                    tempCanvas,
                    sourceX, sourceY, size, size,
                    targetX, targetY, size, size
                );
                
                // 进度报告 (每处理5%或每10个块报告一次，避免频繁调用)
                const percent = Math.floor((i + 1) / totalBlocks * 100);
                if (percent !== lastReportPercent && (percent % 5 === 0 || i === totalBlocks - 1)) {
                    lastReportPercent = percent;
                    if (onProgress) onProgress(percent);
                }
            }
            
            const outputURL = canvas.toDataURL('image/png');
            const prefix = isEncrypt ? 'enc_' : 'dec_';
            let newFilename = prefix + filename.replace(/\.(jpg|jpeg|png)$/i, '.png');
            if (!newFilename.endsWith('.png')) newFilename += '.png';
            
            return { outputURL, newFilename, fillW, fillH };
        }

        // 添加结果到UI
        function addResultToUI(result, originalFilename) {
            resultArea.style.display = 'block';
            
            const item = document.createElement('div');
            item.className = 'result-item';
            
            const img = new Image();
            img.src = result.outputURL;
            
            const info = document.createElement('div');
            info.className = 'file-info';
            info.innerText = `原名: ${originalFilename}\n尺寸: ${result.fillW}x${result.fillH} (PNG无损)`;
            
            const dlBtn = document.createElement('a');
            dlBtn.className = 'download-btn';
            dlBtn.href = result.outputURL;
            dlBtn.download = result.newFilename;
            dlBtn.innerText = `⬇️ 保存 PNG`;
            
            item.appendChild(img);
            item.appendChild(info);
            item.appendChild(dlBtn);
            resultList.appendChild(item);
        }

        // 开始处理
        startBtn.addEventListener('click', async () => {
            const pw = passwordInput.value;
            const size = parseInt(blockSizeInput.value, 10);
            const targetW = parseInt(picWidth.value, 10);
            const targetH = parseInt(picHeight.value, 10);
            
            if (selectedFiles.length === 0) return;
            if (!pw) { alert('密钥必须输入！'); return; }
            if (size < 1) { alert('块大小必须 >= 1'); return; }
            if (!targetW || !targetH || targetW < 1 || targetH < 1) {
                alert('请输入有效的输出宽度和高度 (正整数)');
                return;
            }
            if (!currentMode) { alert('请选择混淆或还原模式！'); return; }
            
            startBtn.disabled = true;
            startBtn.innerText = '正在处理...';
            statusPanel.style.display = 'block';
            resultList.innerHTML = '';
            resultArea.style.display = 'none';
            
            progressBar.style.backgroundColor = currentMode === 'enc' ? 'var(--primary-color)' : 'var(--secondary-color)';
            
            let successCount = 0;
            const total = selectedFiles.length;
            const isEncrypt = (currentMode === 'enc');
            
            for (let i = 0; i < total; i++) {
                const file = selectedFiles[i];
                const fileNum = i + 1;
                
                // 定义内部进度回调
                const onBlockProgress = (percent) => {
                    statusSummary.innerText = `处理图片 ${fileNum}/${total} : ${file.name} — 内部进度 ${percent}%`;
                    // 进度条显示总体进度 + 内部进度加权
                    const overall = ((i + (percent / 100)) / total) * 100;
                    progressBar.style.width = overall + '%';
                };
                
                statusSummary.innerText = `处理图片 ${fileNum}/${total} : ${file.name} — 准备中...`;
                progressBar.style.width = (i / total * 100) + '%';
                
                try {
                    const imgObj = await loadImage(file);
                    await new Promise(r => setTimeout(r, 10));
                    
                    const result = await processSingleImage(
                        imgObj, size, pw, isEncrypt, targetW, targetH, onBlockProgress
                    );
                    
                    addResultToUI(result, file.name);
                    successCount++;
                } catch (err) {
                    console.error(`处理 ${file.name} 失败:`, err);
                    const errorItem = document.createElement('div');
                    errorItem.className = 'result-item';
                    errorItem.style.color = 'red';
                    errorItem.innerText = `❌ 处理失败: ${file.name}`;
                    resultList.appendChild(errorItem);
                    resultArea.style.display = 'block';
                }
            }
            
            progressBar.style.width = '100%';
            statusSummary.innerText = `✅ 处理完成！成功: ${successCount}/${total}。请在下方点击按钮保存 PNG 图片。`;
            startBtn.disabled = false;
            startBtn.innerText = `开始批量处理 (${selectedFiles.length} 张)`;
        });

        // 初始化配置字符串显示
        updateConfigString();
    })();
</script>
</body>
</html>
